services:
  testrix-mysql:
    image: mysql:8.4
    container_name: testrix-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - testrix_mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - testrix

  testrix-gateway:
    build:
      context: ..
      dockerfile: gateway/Dockerfile
    container_name: testrix-gateway
    restart: unless-stopped
    ports:
      - "15000:80"
    networks:
      - testrix

networks:
  testrix:
    name: testrix_network

volumes:
  testrix_mysql_data:
    name: testrix_mysql_data
