server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # Docker's embedded DNS — re-resolve container IPs so backend restarts
    # don't leave the gateway pointing at dead addresses.
    resolver 127.0.0.11 valid=10s;
    set $automation_backend automation-portal-backend;
    set $apitest_backend api-testing-backend;
    set $genai_backend testrix-genai;

    location /automation/api/ {
        rewrite ^/automation(/api/.*)$ $1 break;
        proxy_pass http://$automation_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location /automation/uploads/ {
        rewrite ^/automation(/uploads/.*)$ $1 break;
        proxy_pass http://$automation_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://$automation_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /automation/ {
        try_files $uri $uri/ /automation/index.html;
    }

    # Validates the platform JWT (issued by the automation backend) before any
    # api-testing or genai request is allowed through.
    location = /_auth {
        internal;
        rewrite ^ /api/auth/me break;
        proxy_pass http://$automation_backend:8080;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
    }

    location /apitest/api/ {
        auth_request /_auth;
        rewrite ^/apitest(/api/.*)$ $1 break;
        proxy_pass http://$apitest_backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apitest/ {
        try_files $uri $uri/ /apitest/index.html;
    }

    location /genai/ {
        auth_request /_auth;
        rewrite ^/genai(/.*)$ $1 break;
        proxy_pass http://$genai_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location = /health/automation {
        rewrite ^ /actuator/health break;
        proxy_pass http://$automation_backend:8080;
    }

    location = /health/apitest {
        rewrite ^ /actuator/health break;
        proxy_pass http://$apitest_backend:8080;
    }

    location = /health/genai {
        rewrite ^ / break;
        proxy_pass http://$genai_backend:3000;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
