server:
  port: 8080

spring:
  application:
    name: api-testing-platform-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/testrix_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      # Flyway owns the schema from V1 onward. Hibernate never generates DDL.
      ddl-auto: none
      naming:
        # Preserve explicit @Table names exactly (master-spec tables are
        # uppercase and Linux MySQL is case-sensitive); columns stay snake_case.
        physical-strategy: com.automationportal.apitesting.common.TablePreservingNamingStrategy
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Existing dev DBs already contain the Hibernate-created legacy tables;
    # baseline lets V1 run on top of them (it backfills from them).
    baseline-on-migrate: true
    baseline-version: 0
    # Shares the testrix_platform schema with automation-portal-backend, which
    # already owns the default "flyway_schema_history" table name there — this
    # service needs its own history table to keep the two migration sets separate.
    table: flyway_schema_history_apitest
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

apitesting:
  app:
    frontend-url: ${FRONTEND_URL:http://localhost:15174}
  encryption:
    # AES-256-GCM key (base64, 32 bytes). Override in every real deployment.
    key: ${APITESTING_ENCRYPTION_KEY:ZGV2LW9ubHkta2V5LWNoYW5nZS1pbi1wcm9kLTAwMDE=}
  scheduler:
    poll-interval-ms: ${SCHEDULER_POLL_INTERVAL_MS:15000}
    claim-batch-size: ${SCHEDULER_CLAIM_BATCH_SIZE:200}
    max-concurrent-executions: ${SCHEDULER_MAX_CONCURRENT:20}
    lock-lease-seconds: ${SCHEDULER_LOCK_LEASE_SECONDS:60}
    default-max-retries: ${SCHEDULER_DEFAULT_MAX_RETRIES:3}
    instance-id: ${HOSTNAME:local}
  history:
    inline-body-max-bytes: ${HISTORY_INLINE_BODY_MAX_BYTES:51200}
    retention-days: ${HISTORY_RETENTION_DAYS:90}
    # Local gzip store for oversized bodies (MinIO-shaped interface; swap the
    # BodyStore impl when/if MinIO is introduced).
    body-store-dir: ${HISTORY_BODY_STORE_DIR:history-bodies}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    redis:
      # Redis is an optimization (base-API caching); its absence must not
      # mark the whole app unhealthy in dev.
      enabled: false

logging:
  level:
    com.automationportal.apitesting: INFO
