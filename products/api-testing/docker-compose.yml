services:
  api-testing-redis:
    image: redis:7-alpine
    container_name: api-testing-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - testrix

  api-testing-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-testing-backend
    restart: unless-stopped
    depends_on:
      testrix-mysql:
        condition: service_healthy
      api-testing-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      # Schedule times ("daily at 10:00") and cron expressions are interpreted in this zone.
      TZ: ${SCHEDULER_TZ:-Asia/Kolkata}
      DB_URL: jdbc:mysql://testrix-mysql:3306/testrix_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: api-testing-redis
      FRONTEND_URL: http://localhost:15000
      HISTORY_BODY_STORE_DIR: /app/history-bodies
    volumes:
      - api_testing_history_bodies:/app/history-bodies
    networks:
      - testrix

networks:
  testrix:
    name: testrix_network

volumes:
  api_testing_history_bodies:
    name: api_testing_history_bodies
