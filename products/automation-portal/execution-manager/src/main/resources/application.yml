server:
  port: 8090

spring:
  application:
    name: automation-execution-manager
  datasource:
    url: ${EM_DB_URL:jdbc:mysql://localhost:3306/automation_portal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${EM_DB_USER:root}
    password: ${EM_DB_PASS:root}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

em:
  max-concurrent: ${EM_MAX_CONCURRENT:1}
  timeout-minutes: ${EM_TIMEOUT_MINUTES:120}
  heartbeat-seconds: ${EM_HEARTBEAT_SECONDS:30}
  runner-url: ${EM_RUNNER_URL:http://localhost:9090}
  portal-backend-url: ${EM_PORTAL_BACKEND_URL:http://localhost:8080}
  portal-api-key: ${EM_PORTAL_API_KEY:shared-secret}
