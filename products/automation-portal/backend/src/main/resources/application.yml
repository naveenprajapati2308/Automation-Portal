server:
  port: 8080

spring:
  application:
    name: automation-portal-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: jdbc:mysql://localhost:3306/testrix_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
  web:
    resources:
      static-locations: "classpath:/static/,file:artifacts/"
portal:
  events:
    api-key: ${PORTAL_EVENTS_API_KEY:shared-secret}
  execution-manager:
    url: ${PORTAL_EXECUTION_MANAGER_URL:http://localhost:8090}
  artifact-service:
    url: ${PORTAL_ARTIFACT_SERVICE_URL:http://localhost:9091}
  jwt:
    secret: ${PORTAL_JWT_SECRET:change-this-secret-to-a-long-production-grade-value-of-at-least-256-bits}
    expiration-minutes: ${PORTAL_JWT_EXPIRATION_MINUTES:30}
    refresh-expiration-days: ${PORTAL_JWT_REFRESH_EXPIRATION_DAYS:14}
  automation:
    repository-path: "D:/New folder/MPHIDB"
    maven-command: "mvn test -DsuiteXmlFile={suiteXml} -DopenReport=false"
    artifacts-root: "artifacts"
    suites:
      all:
        name: "Master Automation Suite"
        xml: "MPHIDB-v2.xml"
        report: "reports/Master_Automation_Suite.html"
      land:
        name: "Land Management Suite"
        xml: "land-v2.xml"
        report: "reports/Land_Management_Suite.html"
      architect:
        name: "Architect Empanelment Suite"
        xml: "Emp_Arch-v2.xml"
        report: "reports/Architect_Empanelment_Suite.html"
      arch_workflow:
        name: "Architect Workflow Suite"
        xml: "Arch_workflow-v2.xml"
        report: "reports/Architect_workflow_Suite.html"
    result-files:
      # Maven Surefire's TestNG provider writes TestNG's native reports under
      # target/surefire-reports (not test-output) once -Dusedefaultlisteners=true is set.
      testng-results: "target/surefire-reports/testng-results.xml"
      testng-failed: "target/surefire-reports/testng-failed.xml"
      emailable-report: "target/surefire-reports/emailable-report.html"
      index-report: "target/surefire-reports/index.html"
      screenshots: "screenShots"
      logs: "logs"
  app:
    frontend-url: ${PORTAL_FRONTEND_URL:http://localhost:15173}
  mail:
    from: ${PORTAL_MAIL_FROM:no-reply@automation.local}
    console-only: ${PORTAL_MAIL_CONSOLE_ONLY:true}
  uploads:
    profiles-dir: ${PORTAL_PROFILES_DIR:${PORTAL_AUTOMATION_ARTIFACTS_ROOT:artifacts}/profiles}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  level:
    com.automationportal: INFO
