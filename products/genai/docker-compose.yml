services:
  genai-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: testrix-genai
    restart: unless-stopped
    # Groq/Tavily API keys live in service/.env (never committed).
    env_file:
      - ./service/.env
    networks:
      - testrix

networks:
  testrix:
    name: testrix_network
